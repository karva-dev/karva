name: Primer

on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  primer:
    name: "primer"

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions: {}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: "Install Rust toolchain"
        run: rustup show

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.13"

      - name: "Cache primer projects"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target/primer_projects
          key: primer-${{ hashFiles('scripts/primer.py') }}
          restore-keys: |
            primer-

      - name: "Build branch wheel"
        run: uvx maturin build --out target/wheels-pr/

      - name: "Build main baseline wheel"
        if: github.event_name == 'pull_request'
        run: |
          git worktree add /tmp/karva-main origin/main
          cd /tmp/karva-main
          uvx maturin build --out "$GITHUB_WORKSPACE/target/wheels-main/"
          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/karva-main

      - name: "Run primer"
        run: |
          uv run --script scripts/primer.py -v \
            --wheel "$(ls target/wheels-pr/*.whl)" \
            --baseline-wheel "$(ls target/wheels-main/*.whl)" \
            --markdown-output primer-comment.md

      - name: "Save PR number"
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: echo "${{ github.event.number }}" > pr-number.txt

      - name: "Upload primer results"
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: primer-result
          path: |
            primer-comment.md
            pr-number.txt
